
<!DOCTYPE html>
<html>
<body style="background:#222; color:white;">
    <h1>Skip-Draw (v2) Width Gallery</h1>
    <div id="gallery"></div>
    <script>
        const gallery = document.getElementById('gallery');
        for(let w=50; w<=70; w++) {
            const div = document.createElement('div');
            div.style.display = 'inline-block';
            div.style.margin = '10px';
            div.innerHTML = `<div>w=${w}</div><img src="assets/final_v2/w${w}.png" style="border:1px solid white; width:200px;">`;
            gallery.appendChild(div);
        }
    </script>
</body>
</html>
