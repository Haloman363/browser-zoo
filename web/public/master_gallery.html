
<!DOCTYPE html>
<html>
<body style="background:#222; color:white;">
    <h1>Master Sprite Search</h1>
    <div id="gallery"></div>
    <script>
        const gallery = document.getElementById('gallery');
        const methods = ['sd', 'sc', 'raw'];
        const widths = [57, 108];
        methods.forEach(m => {
            const row = document.createElement('div');
            row.innerHTML = `<h2>Method ${m}</h2>`;
            widths.forEach(w => {
                const div = document.createElement('div');
                div.style.display = 'inline-block';
                div.style.margin = '10px';
                div.innerHTML = `<div>Method ${m} Width ${w}</div><img src="assets/master/${m}_w${w}.png" style="border:1px solid white; width:200px;">`;
                row.appendChild(div);
            });
            gallery.appendChild(row);
        });
    </script>
</body>
</html>
